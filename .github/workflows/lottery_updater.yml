name: Lottery Data Auto Ingestion Pipeline

on:
  schedule:
    # 한국 시간(KST) 매주 목요일/토요일 밤 22:00 자동 실행 (UTC 13:00)
    - cron: '0 13 * * 4,6'
  workflow_dispatch: # 수동 가동 버튼 활성화

jobs:
  build_and_run:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 소스코드 체크아웃
      uses: actions/checkout@v3

    - name: 파이썬 환경 설정 (3.10)
      uses: actions/setup-python@v4
      with:
          python-version: '3.10'

    - name: 필수 의존성 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: ETL 및 분석 엔진 실행
      # [핵심 보완] 파이썬 코드가 깃허브 금고(Secrets)에 있는 암호들을 안전하게 읽어갈 수 있도록 환경변수로 바인딩합니다.
      env:
        SENDER_EMAIL: ${{ secrets.junghoo1022@gmail.com }}
        SENDER_PASSWORD: ${{ secrets.amrn aixz lqqh tqfy }}
        RECEIVER_EMAIL: ${{ secrets.junghoo10@naver.com }}
      run: |
        python updater.py

    - name: 변동된 데이터베이스 및 문서 자동 커밋
      run: |
        git config --global user.name "IDS-Bot"
        git config --global user.email "ids-bot@github.com"
        git add lottery.db README.md
        git diff --staged --quiet || (git commit -m "🤖 [자동 배치] 로터리 DB 데이터 적재 및 차기 분석 번호 최신화" && git push)
