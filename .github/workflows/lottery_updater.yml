name: Lottery Data Auto Ingestion Pipeline

on:
  schedule:
    # 한국 시간(KST) 매주 목요일/토요일 밤 22:00 자동 실행 (UTC 13:00)
    - cron: '0 13 * * 4,6'
  workflow_dispatch: # 수동 가동 버튼 활성화

jobs:
  build_and_run:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 소스코드 체크아웃
      uses: actions/checkout@v4 # [변경] v3 -> v4로 업그레이드하여 Node 24 지원

    - name: 파이썬 환경 설정 (3.10)
      uses: actions/setup-python@v5 # [변경] v4 -> v5로 업그레이드하여 Node 24 지원
      with:
          python-version: '3.10'

    - name: 필수 의존성 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: ETL 및 분석 엔진 실행
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: |
        python updater.py

    - name: 변동된 데이터베이스 및 문서 자동 커밋
      run: |
        git config --global user.name "IDS-Bot"
        git config --global user.email "ids-bot@github.com"
        git add lottery.db README.md
        git diff --staged --quiet || (git commit -m "🤖 [자동 배치] 로터리 DB 데이터 적재 및 차기 분석 번호 최신화" && git push)
