name: Lottery Data Auto Ingestion Pipeline

on:
  schedule:
    # UTC 기준 설정 (한국 시간 = UTC + 9시간)
    # 1. 목요일 밤 22:00 KST -> 목요일 13:00 UTC (연금복권 업데이트용)
    # 2. 토요일 밤 22:00 KST -> 토요일 13:00 UTC (로또 업데이트용)
    - cron: '0 13 * * 4,6'
  workflow_dispatch: # 언제든 수동으로 번호를 뽑아볼 수 있는 버튼 활성화

jobs:
  build_and_run:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 소스코드 체크아웃
      uses: actions/checkout@v3

    - name: 파이썬 환경 설정 (3.10)
      uses: actions/setup-python@v4
      with:
          python-version: '3.10'

    - name: 필수 의존성 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: ETL 및 분석 엔진 실행
      run: |
        python updater.py

    - name: 변동된 데이터베이스 및 문서 자동 커밋
      run: |
        git config --global user.name "IDS-Bot"
        git config --global user.email "ids-bot@github.com"
        git add lottery.db README.md
        # 변경 사항이 있을 때만 커밋 수행 (에러 방지용 가드)
        git diff --staged --quiet || (git commit -m "🤖 [자동 배치] 로터리 DB 데이터 적재 및 차기 분석 번호 최신화" && git push)
